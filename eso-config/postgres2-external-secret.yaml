apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres2-credentials
  namespace: postgres2
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres2-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/postgres2
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: secret/postgres2
        property: postgres-password