apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgres-secret   # name of the K8s Secret ESO will create
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/postgres  # path in Vault
        property: password
